openapi: 3.0.3
info:
  title: Manjo QR API
  description: API untuk generate QR dan update status pembayaran
  version: 1.0.0

servers:
  - url: http://localhost:8080/api/v1/qr
    description: Local Development Server

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: api-key

  schemas:
    Amount:
      type: object
      required:
        - value
        - currency
      properties:
        value:
          type: string
          example: "10000.00"
          description: Nominal transaksi (harus lebih dari 0)
        currency:
          type: string
          example: "IDR"

    GenerateQRRequest:
      type: object
      required:
        - partnerReferenceNo
        - amount
        - merchantId
      properties:
        partnerReferenceNo:
          type: string
          example: DIRECT-API-NMS-whhq7gvx58
        amount:
          $ref: '#/components/schemas/Amount'
        merchantId:
          type: string
          example: EP27842182

    GenerateQRResponse:
      type: object
      properties:
        qrContent:
          type: string
        referenceNo:
          type: string
          example: A6096942400
        responseCode:
          type: string
          example: "2004700"
        responseMessage:
          type: string
          example: Successful

    PaymentRequest:
      type: object
      required:
        - originalReferenceNo
        - originalPartnerReferenceNo
        - transactionStatusDesc
        - paidTime
        - amount
      properties:
        originalReferenceNo:
          type: string
          example: A3889922900
        originalPartnerReferenceNo:
          type: string
          example: DIRECT-API-NMS-whhq7gvx58
        transactionStatusDesc:
          type: string
          example: Success
        paidTime:
          type: string
          format: date-time
          example: 2025-09-21T09:25:00+07:00
        amount:
          $ref: '#/components/schemas/Amount'

    PaymentResponse:
      type: object
      properties:
        responseCode:
          type: string
          example: "2005100"
        responseMessage:
          type: string
          example: Successful
        transactionStatusDesc:
          type: string
          example: Success

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
          example: invalid api key
        status:
          type: string
          example: error

security:
  - ApiKeyAuth: []

paths:
  /generate:
    post:
      summary: Generate QR Code
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateQRRequest'
      responses:
        "200":
          description: Successful QR generation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateQRResponse'
        "400":
          description: Invalid amount (<= 0)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: amount must be greater than zero
                status: error
        "401":
          description: Unauthorized - Missing header or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /payment:
    post:
      summary: Payment Callback
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentRequest'
      responses:
        "200":
          description: Successful payment update
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponse'
        "404":
          description: Transaction not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: transaction not found
                status: error
        "401":
          description: Unauthorized - Missing header or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'